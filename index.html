<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-counter</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>T</text></svg>">
<style>
:root {
    --bg: #0a0a14;
    --surface: #16162a;
    --accent: #ff6b35;
    --accent-light: #ff8c42;
    --accent-dark: #d94f1a;
    --accent-glow: rgba(255, 107, 53, 0.15);
    --accent-subtle: rgba(255, 107, 53, 0.06);
    --text: #f0ece4;
    --text-dim: #8a8a9a;
    --text-muted: #5a5a6e;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.container {
    width: 100%;
    max-width: 800px;
    padding: 2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
}
header { text-align: center; margin-bottom: 1.5rem; }
h1 {
    text-transform: uppercase;
    letter-spacing: 0.35em;
    font-weight: 200;
    opacity: 0.5;
    font-size: 1.5rem;
}
.tagline { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
textarea {
    width: 100%;
    min-height: 200px;
    background: var(--surface);
    border: 1px solid var(--text-muted);
    border-radius: var(--radius-md);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    padding: 1rem;
    resize: vertical;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }
.toolbar {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.8rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
}
.btn {
    padding: 0.5rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--text-muted);
    border-radius: var(--radius-sm);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.8rem;
    transition: all 0.2s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-light); }
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.2rem;
}
.stat-card {
    background: var(--surface);
    border: 1px solid var(--text-muted);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
}
.stat-card .stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent-light);
    font-family: var(--mono);
}
.stat-card .stat-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
.progress-section {
    margin-bottom: 1.2rem;
}
.progress-item {
    margin-bottom: 0.8rem;
}
.progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
}
.progress-bar {
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.2s, background 0.2s;
    background: var(--accent);
}
.progress-fill.over { background: #d44; }
.char-freq {
    margin-top: 1rem;
}
.char-freq h3 {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
}
.freq-bars {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
    height: 120px;
}
.freq-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
}
.freq-bar {
    width: 100%;
    max-width: 36px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.3s;
}
.freq-bar-char {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    font-family: var(--mono);
}
.freq-bar-count {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
}
footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: auto;
}
footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
<header>
    <h1>text-counter</h1>
    <p class="tagline">Real-time text analysis</p>
</header>
<textarea id="textInput" placeholder="Start typing or paste text here..." spellcheck="false"></textarea>
<div class="toolbar">
    <button class="btn btn-primary" id="clearBtn">Clear</button>
    <button class="btn" id="pasteBtn">Paste</button>
</div>
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-value" id="charWithSpaces">0</div>
        <div class="stat-label">Chars (w/ spaces)</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="charWithoutSpaces">0</div>
        <div class="stat-label">Chars (no spaces)</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="sentenceCount">0</div>
        <div class="stat-label">Sentences</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="paragraphCount">0</div>
        <div class="stat-label">Paragraphs</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="lineCount">0</div>
        <div class="stat-label">Lines</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="readingTime">0s</div>
        <div class="stat-label">Reading (238 wpm)</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="speakingTime">0s</div>
        <div class="stat-label">Speaking (183 wpm)</div>
    </div>
</div>
<div class="progress-section">
    <div class="progress-item">
        <div class="progress-header">
            <span>Twitter / X limit</span>
            <span id="twitterCount">0 / 280</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="twitterFill" style="width:0%"></div>
        </div>
    </div>
    <div class="progress-item">
        <div class="progress-header">
            <span>SMS limit</span>
            <span id="smsCount">0 / 160</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="smsFill" style="width:0%"></div>
        </div>
    </div>
</div>
<div class="char-freq">
    <h3>Top Characters</h3>
    <div class="freq-bars" id="freqBars"></div>
</div>
<footer>
    <a href="https://soumendrak.github.io/text-counter/">soumendrak — licensed under MIT</a>
</footer>
</div>
<script>
(function(){
'use strict';

const textarea = document.getElementById('textInput');
const charWithSpaces = document.getElementById('charWithSpaces');
const charWithoutSpaces = document.getElementById('charWithoutSpaces');
const wordCount = document.getElementById('wordCount');
const sentenceCount = document.getElementById('sentenceCount');
const paragraphCount = document.getElementById('paragraphCount');
const lineCount = document.getElementById('lineCount');
const readingTime = document.getElementById('readingTime');
const speakingTime = document.getElementById('speakingTime');
const twitterCount = document.getElementById('twitterCount');
const twitterFill = document.getElementById('twitterFill');
const smsCount = document.getElementById('smsCount');
const smsFill = document.getElementById('smsFill');
const freqBars = document.getElementById('freqBars');
const clearBtn = document.getElementById('clearBtn');
const pasteBtn = document.getElementById('pasteBtn');

function updateStats() {
    const text = textarea.value;
    const charsWith = text.length;
    const charsWithout = text.replace(/\s/g, '').length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const sentences = text ? (text.match(/[.!?]+/g) || []).length : 0;
    const lines = text ? text.split('\n').length : 0;
    const paragraphs = text ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;

    charWithSpaces.textContent = charsWith;
    charWithoutSpaces.textContent = charsWithout;
    wordCount.textContent = words;
    sentenceCount.textContent = sentences;
    lineCount.textContent = lines;
    paragraphCount.textContent = paragraphs;

    // Reading time at 238 wpm
    const readMin = words / 238;
    const readSec = Math.round(readMin * 60);
    readingTime.textContent = readSec < 60 ? readSec + 's' : Math.floor(readSec / 60) + 'm ' + (readSec % 60) + 's';

    // Speaking time at 183 wpm
    const speakMin = words / 183;
    const speakSec = Math.round(speakMin * 60);
    speakingTime.textContent = speakSec < 60 ? speakSec + 's' : Math.floor(speakSec / 60) + 'm ' + (speakSec % 60) + 's';

    // Twitter/X limit
    twitterCount.textContent = charsWith + ' / 280';
    const twitterPct = Math.min(charsWith / 280 * 100, 100);
    twitterFill.style.width = twitterPct + '%';
    twitterFill.classList.toggle('over', charsWith > 280);

    // SMS limit
    smsCount.textContent = charsWith + ' / 160';
    const smsPct = Math.min(charsWith / 160 * 100, 100);
    smsFill.style.width = smsPct + '%';
    smsFill.classList.toggle('over', charsWith > 160);

    // Character frequency
    updateFreq(text);
}

function updateFreq(text) {
    const freq = {};
    const letters = text.replace(/\s/g, '').toLowerCase();
    for (const ch of letters) {
        if (/[a-z0-9]/i.test(ch) || ch in freq) {
            freq[ch] = (freq[ch] || 0) + 1;
        }
    }
    const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const maxCount = sorted.length > 0 ? sorted[0][1] : 1;

    freqBars.innerHTML = '';
    if (sorted.length === 0) {
        const empty = document.createElement('div');
        empty.textContent = 'Type something to see character frequency';
        empty.style.cssText = 'color: var(--text-muted); font-size: 0.8rem; padding-top: 1rem;';
        freqBars.appendChild(empty);
        return;
    }

    for (const [char, count] of sorted) {
        const wrap = document.createElement('div');
        wrap.className = 'freq-bar-wrap';

        const countLabel = document.createElement('div');
        countLabel.className = 'freq-bar-count';
        countLabel.textContent = count;

        const bar = document.createElement('div');
        bar.className = 'freq-bar';
        bar.style.height = (count / maxCount * 100) + '%';

        const charLabel = document.createElement('div');
        charLabel.className = 'freq-bar-char';
        charLabel.textContent = char === ' ' ? '␣' : char;

        wrap.appendChild(countLabel);
        wrap.appendChild(bar);
        wrap.appendChild(charLabel);
        freqBars.appendChild(wrap);
    }
}

textarea.addEventListener('input', updateStats);

clearBtn.addEventListener('click', function() {
    textarea.value = '';
    updateStats();
    textarea.focus();
});

pasteBtn.addEventListener('click', function() {
    navigator.clipboard.readText().then(text => {
        textarea.value = text;
        updateStats();
    }).catch(() => {
        textarea.focus();
        document.execCommand('paste');
        updateStats();
    });
});

// Initial
updateStats();
})();
</script>
</body>
</html>
